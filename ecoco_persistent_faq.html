<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOCO FAQ 管理系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ecoco: {
                            orange: '#FF5000',
                            deepBlue: '#060E9F',
                            yellow: '#FFCE00',
                            lightBlue: '#8EB9C9',
                            beige: '#FAE0B8',
                            aqua: '#0076A9',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        .card-animate { transition: transform 0.2s, box-shadow 0.2s; }
        .card-animate:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }

        /* ── Sidebar ── */
        #faq-sidebar {
            width: 76px;
            min-width: 76px;
            background: #060E9F;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px 0 20px;
            gap: 2px;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 40;
        }
        .sb-logo {
            width: 38px; height: 38px;
            background: #FF5000;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: #fff; font-size: 17px;
            margin-bottom: 14px;
        }
        .sb-btn {
            display: flex; flex-direction: column; align-items: center;
            gap: 4px; padding: 9px 6px;
            border-radius: 12px; cursor: pointer;
            width: 64px;
            transition: background 0.15s;
            border: none; background: transparent;
        }
        .sb-btn:hover { background: rgba(255,255,255,0.12); }
        .sb-btn.sb-active { background: rgba(255,255,255,0.2); }
        .sb-btn svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.55); transition: stroke 0.15s; }
        .sb-btn.sb-active svg, .sb-btn:hover svg { stroke: #fff; }
        .sb-btn .sb-label { font-size: 10px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.3; transition: color 0.15s; }
        .sb-btn.sb-active .sb-label, .sb-btn:hover .sb-label { color: #fff; }
        .sb-btn.sb-hot svg { stroke: #fbbf24; }
        .sb-btn.sb-hot .sb-label { color: #fbbf24; }
        .sb-btn.sb-hot:hover svg, .sb-btn.sb-hot.sb-active svg { stroke: #fde68a; }
        .sb-divider { width: 38px; height: 1px; background: rgba(255,255,255,0.15); margin: 8px 0; }
        .sb-badge {
            background: #f59e0b; color: #fff; font-size: 9px;
            padding: 1px 5px; border-radius: 999px; font-weight: 700;
            min-width: 16px; text-align: center; line-height: 1.6;
        }

        /* ── Hot Panel ── */
        #hot-panel {
            position: fixed; top: 0; left: 76px;
            width: 340px; height: 100vh;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            z-index: 200;
            display: none;
            flex-direction: column;
            box-shadow: 6px 0 24px rgba(0,0,0,0.1);
            transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
        }
        #hot-panel.open { display: flex; }
        #hot-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(6,14,159,0.15);
            z-index: 190; backdrop-filter: blur(1px);
        }
        #hot-overlay.open { display: block; }
        .hot-card {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 11px 14px; border-radius: 10px;
            border: 1px solid #e2e8f0; margin-bottom: 8px;
            cursor: pointer; background: #fff;
            transition: border-color 0.15s, background 0.15s;
        }
        .hot-card:hover { border-color: #060E9F; background: #f0f3ff; }
        .hot-rank { font-size: 17px; font-weight: 700; min-width: 22px; text-align: center; line-height: 1.2; }
        .rank-1 { color: #f59e0b; } .rank-2 { color: #94a3b8; } .rank-3 { color: #b45309; } .rank-n { color: #cbd5e1; font-size: 13px; }
        .hot-title { font-size: 13px; font-weight: 500; color: #1e293b; margin-bottom: 3px; }
        .hot-count { display: inline-flex; align-items: center; gap: 3px; background: #fef3c7; color: #92400e; padding: 1px 7px; border-radius: 999px; font-weight: 600; font-size: 11px; }

        /* ── Filter Bar ── */
        #filter-bar {
            display: none; align-items: center; gap: 8px;
            padding: 7px 20px;
            background: #eff3ff; border-bottom: 1px solid #c7d2fe;
            font-size: 13px; color: #3730a3;
        }
        #filter-bar.visible { display: flex; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const API_URL = 'http://127.0.0.1:7777';

        // ── localStorage helpers ──
        const COPY_KEY = 'ecoco_copy_counts';
        function getCopyCounts() {
            try { return JSON.parse(localStorage.getItem(COPY_KEY) || '{}'); } catch { return {}; }
        }
        function saveCopyCounts(data) {
            localStorage.setItem(COPY_KEY, JSON.stringify(data));
        }

        function App() {
            const [faqs, setFaqs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [connected, setConnected] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingFaq, setEditingFaq] = useState(null);
            const [formData, setFormData] = useState({ theme: '', main_item: '', sub_item: '', detail: '', content_v1: '', content_v2: '' });
            const [guideVisible, setGuideVisible] = useState(true);

            // Sidebar state
            const [sidebarFilter, setSidebarFilter] = useState('all');
            const [hotOpen, setHotOpen] = useState(false);
            const [copyCounts, setCopyCounts] = useState(getCopyCounts());

            useEffect(() => {
                checkConnection();
                fetchFaqs();
                const interval = setInterval(checkConnection, 5000);
                return () => clearInterval(interval);
            }, []);

            const checkConnection = async () => {
                try {
                    const res = await fetch(`${API_URL}/faqs`, { method: 'GET' });
                    setConnected(res.ok);
                } catch (e) { setConnected(false); }
            };

            const fetchFaqs = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${API_URL}/faqs`);
                    if (res.ok) {
                        const data = await res.json();
                        setFaqs(Array.isArray(data) ? data : []);
                    }
                } catch (e) { console.error("Failed to fetch FAQs", e); }
                finally { setLoading(false); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const method = editingFaq ? 'PUT' : 'POST';
                const url = editingFaq ? `${API_URL}/faqs/${editingFaq.id}` : `${API_URL}/faqs`;
                try {
                    const res = await fetch(url, {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData),
                    });
                    if (res.ok) { fetchFaqs(); closeModal(); }
                    else { const errData = await res.json(); alert(`操作失敗: ${errData.detail || '未知錯誤'}`); }
                } catch (e) { alert("操作失敗，請檢查後端連線 (localhost:8000)"); }
            };

            const handleDelete = async (id) => {
                if (!confirm('確定要刪除這條常見問題嗎？')) return;
                try {
                    const res = await fetch(`${API_URL}/faqs/${id}`, { method: 'DELETE' });
                    if (res.ok) fetchFaqs();
                    else alert("刪除失敗");
                } catch (e) { alert("連線失敗"); }
            };

            const openModal = (faq = null) => {
                if (faq) {
                    setEditingFaq(faq);
                    setFormData({ theme: faq.theme || '', main_item: faq.main_item || '', sub_item: faq.sub_item || '', detail: faq.detail || '', content_v1: faq.content_v1 || '', content_v2: faq.content_v2 || '' });
                } else {
                    setEditingFaq(null);
                    setFormData({ theme: '', main_item: '', sub_item: '', detail: '', content_v1: '', content_v2: '' });
                }
                setIsModalOpen(true);
            };

            const closeModal = () => { setIsModalOpen(false); setEditingFaq(null); };

            // ── Copy with tracking ──
            const copyToClipboard = (text, faqId, faqLabel) => {
                if (!text) return;
                navigator.clipboard.writeText(text);
                alert('已複製到剪貼簿');
                // Track copy count
                const counts = getCopyCounts();
                if (!counts[faqId]) counts[faqId] = { label: faqLabel, count: 0 };
                counts[faqId].count += 1;
                counts[faqId].label = faqLabel;
                saveCopyCounts(counts);
                setCopyCounts({...counts});
            };

            const copyRowForSheet = (faq) => {
                const row = [faq.theme||'', faq.main_item||'', faq.sub_item||'', faq.detail||'', faq.content_v1||'', faq.content_v2||'', faq.created_date||''].join('\t');
                navigator.clipboard.writeText(row);
                alert('已複製整列資料 (適用於 Google Sheet 貼上)');
            };

            // ── Filtering ──
            const filteredFaqs = useMemo(() => {
                let result = faqs.filter(faq =>
                    (faq.theme || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (faq.content_v1 || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (faq.content_v2 || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (faq.main_item || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (faq.detail || '').toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (faq.sub_item || '').toLowerCase().includes(searchTerm.toLowerCase())
                );
                if (sidebarFilter === 'theme') result = result.filter(f => f.theme);
                else if (sidebarFilter === 'item') result = result.filter(f => f.main_item);
                else if (sidebarFilter === 'version') result = result.filter(f => f.sub_item);
                return result;
            }, [faqs, searchTerm, sidebarFilter]);

            // ── Hot panel data ──
            const hotList = useMemo(() => {
                return Object.entries(copyCounts)
                    .map(([id, v]) => ({ id, label: v.label, count: v.count }))
                    .sort((a, b) => b.count - a.count);
            }, [copyCounts]);

            const hotBadgeCount = hotList.length;

            const scrollToFaq = (faqId) => {
                setHotOpen(false);
                setTimeout(() => {
                    const el = document.getElementById('faq-' + faqId);
                    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.outline = '2px solid #060E9F'; setTimeout(() => el.style.outline = '', 2000); }
                }, 200);
            };

            const filterLabels = { theme: '主題', item: '項目', version: '版本' };
            const medals = ['🥇','🥈','🥉'];

            return (
                <div style={{ display: 'flex', minHeight: '100vh' }}>

                    {/* ── Sidebar ── */}
                    <nav id="faq-sidebar">
                        <div className="sb-logo">E</div>

                        <button className={`sb-btn ${sidebarFilter === 'all' ? 'sb-active' : ''}`} onClick={() => setSidebarFilter('all')}>
                            <svg viewBox="0 0 24 24" fill="none" strokeWidth="1.6"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
                            <span className="sb-label">全部</span>
                        </button>

                        <button className={`sb-btn ${sidebarFilter === 'theme' ? 'sb-active' : ''}`} onClick={() => setSidebarFilter('theme')}>
                            <svg viewBox="0 0 24 24" fill="none" strokeWidth="1.6"><path d="M4 6h16M4 10h16M4 14h10"/><circle cx="18" cy="16" r="3"/><path d="M20.5 18.5L22 20"/></svg>
                            <span className="sb-label">主題</span>
                        </button>

                        <button className={`sb-btn ${sidebarFilter === 'item' ? 'sb-active' : ''}`} onClick={() => setSidebarFilter('item')}>
                            <svg viewBox="0 0 24 24" fill="none" strokeWidth="1.6"><rect x="3" y="5" width="18" height="3" rx="1"/><rect x="3" y="11" width="18" height="3" rx="1"/><rect x="3" y="17" width="12" height="3" rx="1"/></svg>
                            <span className="sb-label">項目</span>
                        </button>

                        <button className={`sb-btn ${sidebarFilter === 'version' ? 'sb-active' : ''}`} onClick={() => setSidebarFilter('version')}>
                            <svg viewBox="0 0 24 24" fill="none" strokeWidth="1.6"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg>
                            <span className="sb-label">版本</span>
                        </button>

                        <div className="sb-divider"></div>

                        <button className={`sb-btn sb-hot ${hotOpen ? 'sb-active' : ''}`} onClick={() => setHotOpen(!hotOpen)}>
                            <svg viewBox="0 0 24 24" fill="none" strokeWidth="1.6"><path d="M12 2c0 6-6 8-6 14a6 6 0 0012 0c0-2-1-3.5-2-5-1 2-2 3-3 3 1-3 1-7-1-12z"/></svg>
                            <span className="sb-label">熱門</span>
                            {hotBadgeCount > 0 && <span className="sb-badge">{hotBadgeCount > 99 ? '99+' : hotBadgeCount}</span>}
                        </button>
                    </nav>

                    {/* ── Main Content ── */}
                    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>

                        {/* Header — unchanged */}
                        <header className="bg-ecoco-deepBlue text-white p-4 shadow-lg sticky top-0 z-50">
                            <div className="container mx-auto flex justify-between items-center">
                                <div className="flex items-center space-x-3">
                                    <div className="bg-white p-1 rounded-lg">
                                        <div className="w-8 h-8 bg-ecoco-orange rounded-full flex items-center justify-center font-bold text-white shadow-inner">E</div>
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold tracking-wider">ECOCO FAQ Assistant</h1>
                                        <p className="text-[10px] text-ecoco-lightBlue uppercase tracking-[0.2em]">Knowledge Base Management</p>
                                    </div>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <button onClick={() => setGuideVisible(!guideVisible)} className="text-ecoco-yellow hover:text-white transition-colors flex items-center space-x-1 text-sm font-medium">
                                        <i className="fas fa-info-circle"></i>
                                        <span className="hidden sm:inline">操作說明</span>
                                    </button>
                                    <div className="flex items-center space-x-2 bg-white/10 px-3 py-1.5 rounded-full border border-white/20">
                                        <div className={`w-2.5 h-2.5 rounded-full ${connected ? 'bg-green-400 shadow-[0_0_8px_rgba(74,222,128,0.5)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]'}`}></div>
                                        <span className="text-[10px] uppercase font-bold tracking-widest">{connected ? 'Online' : 'Offline'}</span>
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* Filter indicator bar */}
                        {sidebarFilter !== 'all' && (
                            <div id="filter-bar" className="visible">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#3730a3" strokeWidth="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                                <span>篩選中：<strong>{filterLabels[sidebarFilter]}</strong>（共 {filteredFaqs.length} 筆）</span>
                                <button onClick={() => setSidebarFilter('all')} style={{ marginLeft: 'auto', cursor: 'pointer', fontSize: 12, color: '#6366f1', background: 'none', border: 'none', padding: '2px 8px', borderRadius: 6 }}>✕ 清除篩選</button>
                            </div>
                        )}

                        <main className="flex-grow container mx-auto p-4 md:p-8">
                            {/* Guide — unchanged */}
                            {guideVisible && (
                                <div className="bg-ecoco-beige/50 border-l-4 border-ecoco-orange p-5 mb-8 rounded-r-2xl shadow-sm animate-fade-in flex items-start space-x-4">
                                    <div className="bg-ecoco-orange text-white p-2 rounded-full hidden sm:block"><i className="fas fa-rocket"></i></div>
                                    <div className="flex-grow">
                                        <div className="flex justify-between items-start">
                                            <h3 className="font-bold text-ecoco-deepBlue mb-2">如何開始使用 (持久化模式)？</h3>
                                            <button onClick={() => setGuideVisible(false)} className="text-gray-400 hover:text-gray-600">&times;</button>
                                        </div>
                                        <p className="text-xs text-gray-600 mb-3">為了讓資料真的儲存（重新開啟時依然存在），請按照以下步驟操作：</p>
                                        <ul className="list-none space-y-2 text-sm text-gray-700">
                                            <li className="flex items-center space-x-2"><i className="fas fa-check-circle text-ecoco-aqua text-xs"></i><span>請在您的電腦終端機執行： <code className="bg-white px-2 py-0.5 rounded border font-mono text-ecoco-orange text-xs">python faq_server.py</code></span></li>
                                            <li className="flex items-center space-x-2"><i className="fas fa-check-circle text-ecoco-aqua text-xs"></i><span>確保後端伺服器在： <span className="underline decoration-ecoco-lightBlue underline-offset-2">http://127.0.0.1:7777</span></span></li>
                                            <li className="flex items-center space-x-2"><i className="fas fa-check-circle text-ecoco-aqua text-xs"></i><span>當右上方狀態為 <span className="text-green-600 font-bold">Online</span> 時，所有新增/修改都會永久儲存在 SQLite 資料庫中。</span></li>
                                        </ul>
                                    </div>
                                </div>
                            )}

                            {/* Search and Action Bar — unchanged */}
                            <div className="mb-10 flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-4">
                                <div className="relative flex-grow w-full">
                                    <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-ecoco-deepBlue/30"></i>
                                    <input
                                        type="text"
                                        placeholder="搜尋常見問題 (主題、分類、內容...)"
                                        className="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-ecoco-deepBlue/20 focus:border-ecoco-deepBlue outline-none shadow-sm transition-all bg-white"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <div className="flex space-x-2 w-full md:w-auto">
                                    <button onClick={() => { checkConnection(); fetchFaqs(); }} className="bg-white text-ecoco-deepBlue p-4 rounded-2xl border border-gray-100 shadow-sm hover:bg-gray-50 transition-all flex items-center justify-center" title="重新整理連線">
                                        <i className={`fas fa-sync-alt ${loading ? 'animate-spin' : ''}`}></i>
                                    </button>
                                    <button onClick={() => openModal()} className="bg-ecoco-orange text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-ecoco-orange/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center space-x-2 whitespace-nowrap flex-grow justify-center">
                                        <i className="fas fa-plus-circle"></i>
                                        <span>新增常見問題</span>
                                    </button>
                                </div>
                            </div>

                            {!connected && (
                                <div className="bg-red-50 border-2 border-red-100 p-8 rounded-3xl text-center mb-10">
                                    <div className="text-red-400 text-4xl mb-3"><i className="fas fa-exclamation-triangle"></i></div>
                                    <h3 className="text-lg font-bold text-red-700">無法連線至後端伺服器 (Offline)</h3>
                                    <p className="text-red-600/70 text-sm mt-1 mb-4">目前處於離線模式，變更將無法儲存。請確認已啟動 <code className="bg-red-100 px-1 rounded">faq_server.py</code>。</p>
                                    <div className="text-[10px] text-gray-400 font-mono bg-white/50 p-2 rounded inline-block">Target: {API_URL}/faqs</div>
                                </div>
                            )}

                            {loading ? (
                                <div className="flex flex-col justify-center items-center h-64 space-y-4">
                                    <div className="w-12 h-12 border-4 border-ecoco-lightBlue border-t-ecoco-orange rounded-full animate-spin"></div>
                                    <p className="text-ecoco-deepBlue font-medium animate-pulse">載入資料中...</p>
                                </div>
                            ) : filteredFaqs.length > 0 ? (
                                <div className="space-y-8">
                                    {filteredFaqs.map(faq => (
                                        <div key={faq.id} id={`faq-${faq.id}`} className="bg-white rounded-2xl shadow-sm border-l-4 border-l-ecoco-deepBlue border border-gray-100 overflow-hidden flex flex-col animate-fade-in group">
                                            {/* Row 1 — unchanged */}
                                            <div className="p-4 md:p-6 border-b border-gray-50 flex flex-col md:flex-row items-start md:items-center space-y-4 md:space-y-0">
                                                <div className="flex flex-wrap gap-2 md:mr-4 text-base">
                                                    <div className="flex items-center bg-indigo-50 text-ecoco-deepBlue font-bold rounded overflow-hidden border border-indigo-100">
                                                        <span className="bg-indigo-100 px-3 py-1.5">主題</span>
                                                        <span className="px-3 py-1.5">{faq.theme}</span>
                                                    </div>
                                                    <div className="flex items-center bg-cyan-50 text-ecoco-aqua font-bold rounded overflow-hidden border border-cyan-100">
                                                        <span className="bg-cyan-100 px-3 py-1.5">項目</span>
                                                        <span className="px-3 py-1.5">{faq.main_item || '-'}</span>
                                                    </div>
                                                    <div className="flex items-center bg-blue-50 text-ecoco-lightBlue font-bold rounded overflow-hidden border border-blue-100">
                                                        <span className="bg-blue-100 px-3 py-1.5">版本</span>
                                                        <span className="px-3 py-1.5">{faq.sub_item || '-'}</span>
                                                    </div>
                                                </div>
                                                <h3 className="font-bold text-ecoco-deepBlue text-lg flex-grow">{faq.detail}</h3>
                                                <div className="flex items-center space-x-4 w-full md:w-auto justify-between md:justify-end">
                                                    <span className="text-[10px] text-gray-400 font-medium">建立日: {faq.created_date}</span>
                                                    <div className="flex space-x-1">
                                                        <button onClick={() => openModal(faq)} className="p-2 text-gray-400 hover:text-ecoco-deepBlue transition-colors"><i className="fas fa-pen"></i></button>
                                                        <button onClick={() => handleDelete(faq.id)} className="p-2 text-gray-400 hover:text-red-500 transition-colors"><i className="fas fa-trash-alt"></i></button>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Row 2 — copy buttons now track usage */}
                                            <div className="p-4 md:p-6 grid grid-cols-1 lg:grid-cols-2 gap-4 bg-gray-50/30">
                                                <div className="bg-white rounded-xl border border-gray-100 p-4 shadow-sm relative group/v1">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <div className="flex items-center space-x-2">
                                                            <span className="bg-ecoco-orange text-white text-[10px] font-black px-1.5 py-0.5 rounded">V1</span>
                                                            <span className="text-sm font-bold text-ecoco-orange">標準回覆</span>
                                                        </div>
                                                        <button onClick={() => copyToClipboard(faq.content_v1, faq.id, faq.detail || faq.theme)} className="text-sm bg-gray-50 text-ecoco-deepBlue px-3 py-1.5 rounded border border-gray-100 hover:bg-ecoco-deepBlue hover:text-white transition-all flex items-center space-x-1">
                                                            <i className="fas fa-copy"></i><span>複製</span>
                                                        </button>
                                                    </div>
                                                    <div className="text-sm text-gray-600 leading-relaxed min-h-[5rem] whitespace-pre-wrap">
                                                        {faq.content_v1 || <span className="italic text-gray-300">尚未輸入內容...</span>}
                                                    </div>
                                                </div>
                                                <div className="bg-white rounded-xl border border-gray-100 p-4 shadow-sm relative group/v2">
                                                    <div className="flex justify-between items-center mb-3">
                                                        <div className="flex items-center space-x-2">
                                                            <span className="bg-ecoco-aqua text-white text-[10px] font-black px-1.5 py-0.5 rounded">V2</span>
                                                            <span className="text-sm font-bold text-ecoco-aqua">備用/英文</span>
                                                        </div>
                                                        <button onClick={() => copyToClipboard(faq.content_v2, faq.id, faq.detail || faq.theme)} className="text-sm bg-gray-50 text-ecoco-deepBlue px-3 py-1.5 rounded border border-gray-100 hover:bg-ecoco-deepBlue hover:text-white transition-all flex items-center space-x-1">
                                                            <i className="fas fa-copy"></i><span>複製</span>
                                                        </button>
                                                    </div>
                                                    <div className="text-sm text-gray-600 leading-relaxed min-h-[5rem] whitespace-pre-wrap">
                                                        {faq.content_v2 || <span className="italic text-gray-300">尚未輸入內容...</span>}
                                                    </div>
                                                </div>
                                            </div>

                                            {/* Row 3 — unchanged */}
                                            <div className="px-4 py-3 md:px-6 bg-ecoco-beige/20 border-t border-gray-50 flex flex-col md:flex-row justify-between items-center space-y-3 md:space-y-0">
                                                <div className="flex items-center space-x-2 text-ecoco-orange">
                                                    <i className="far fa-lightbulb text-sm animate-pulse"></i>
                                                    <span className="text-[11px] font-bold">這筆問答還沒匯入總表嗎?</span>
                                                </div>
                                                <button onClick={() => copyRowForSheet(faq)} className="bg-ecoco-deepBlue text-white text-[11px] font-bold px-4 py-2 rounded-lg flex items-center space-x-2 hover:bg-black transition-all shadow-md active:scale-95">
                                                    <i className="fas fa-file-export"></i>
                                                    <span>複製整列 (Google Sheet 格式)</span>
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <div className="text-center py-20 bg-white/50 rounded-[3rem] border-4 border-dashed border-ecoco-beige flex flex-col items-center">
                                    <div className="w-24 h-24 bg-ecoco-beige/30 rounded-full flex items-center justify-center text-ecoco-beige text-5xl mb-6">
                                        <i className="fas fa-cloud-sun"></i>
                                    </div>
                                    <h3 className="text-2xl font-bold text-ecoco-deepBlue/40">
                                        {searchTerm || sidebarFilter !== 'all' ? '無相符結果' : '探索新的問題'}
                                    </h3>
                                </div>
                            )}
                        </main>

                        {/* Modal — unchanged */}
                        {isModalOpen && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-ecoco-deepBlue/20 backdrop-blur-md">
                                <div className="bg-white rounded-[2.5rem] w-full max-w-6xl shadow-2xl overflow-hidden animate-modal-up border border-white max-h-[90vh] overflow-y-auto">
                                    <div className="bg-white p-8 pb-4 text-ecoco-deepBlue flex justify-between items-center sticky top-0 z-10">
                                        <div className="flex items-center space-x-3">
                                            <div className="bg-ecoco-orange/10 text-ecoco-orange p-2 rounded-lg"><i className="far fa-file-alt text-xl"></i></div>
                                            <h2 className="text-2xl font-bold">記錄新的用戶問題至知識庫</h2>
                                        </div>
                                        <button onClick={closeModal} className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors text-2xl text-gray-400">&times;</button>
                                    </div>
                                    <form onSubmit={handleSubmit} className="p-8 space-y-8">
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-ecoco-deepBlue flex items-center mb-1">主題 (Theme)</label>
                                                <input type="text" required placeholder="例: APP2.0" className="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-transparent focus:border-ecoco-deepBlue focus:bg-white outline-none transition-all" value={formData.theme} onChange={(e) => setFormData({...formData, theme: e.target.value})} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-ecoco-deepBlue flex items-center mb-1">主項目 (Main Item)</label>
                                                <input type="text" placeholder="例: 站點" className="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-transparent focus:border-ecoco-deepBlue focus:bg-white outline-none transition-all" value={formData.main_item} onChange={(e) => setFormData({...formData, main_item: e.target.value})} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-ecoco-deepBlue flex items-center mb-1">小項目 (Sub Item)</label>
                                                <input type="text" placeholder="例: 繁體版" className="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-transparent focus:border-ecoco-deepBlue focus:bg-white outline-none transition-all" value={formData.sub_item} onChange={(e) => setFormData({...formData, sub_item: e.target.value})} />
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-bold text-ecoco-deepBlue flex items-center mb-1">細項 (Detail/User Question)</label>
                                                <input type="text" placeholder="例: 地圖看不到綠色站點" className="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-transparent focus:border-ecoco-deepBlue focus:bg-white outline-none transition-all" value={formData.detail} onChange={(e) => setFormData({...formData, detail: e.target.value})} />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-3">
                                                <label className="text-sm font-bold text-ecoco-orange flex items-center">內容版本1 (標準官方回覆)</label>
                                                <textarea rows="6" placeholder="請輸入適合直接貼給用戶的標準回覆..." className="w-full px-5 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-ecoco-orange focus:bg-white outline-none transition-all resize-none shadow-inner" value={formData.content_v1} onChange={(e) => setFormData({...formData, content_v1: e.target.value})}></textarea>
                                            </div>
                                            <div className="space-y-3">
                                                <label className="text-sm font-bold text-ecoco-aqua flex items-center">內容版本2 (英文版 / 備註補充)</label>
                                                <textarea rows="6" placeholder="請輸入備用語句或英文翻譯版..." className="w-full px-5 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-ecoco-aqua focus:bg-white outline-none transition-all resize-none shadow-inner" value={formData.content_v2} onChange={(e) => setFormData({...formData, content_v2: e.target.value})}></textarea>
                                            </div>
                                        </div>
                                        <div className="flex justify-end space-x-6 pt-4">
                                            <button type="button" onClick={closeModal} className="px-10 py-4 border-2 border-gray-100 rounded-2xl font-bold text-gray-400 hover:bg-gray-50 transition-colors">取消</button>
                                            <button type="submit" className="px-12 py-4 bg-ecoco-orange text-white rounded-2xl font-bold shadow-xl shadow-ecoco-orange/30 hover:scale-[1.02] active:scale-95 transition-all">確認儲存</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        <style>{`
                            @keyframes modal-up { from { transform: translateY(40px) opacity: 0; } to { transform: translateY(0) opacity: 1; } }
                            .animate-modal-up { animation: modal-up 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
                            .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
                            @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
                            .animate-fade-in { animation: fade-in 0.6s ease-out; }
                        `}</style>
                    </div>

                    {/* ── Hot Panel ── */}
                    {hotOpen && (
                        <div id="hot-overlay" className="open" onClick={() => setHotOpen(false)}></div>
                    )}
                    <div id="hot-panel" className={hotOpen ? 'open' : ''}>
                        <div style={{ background: '#060E9F', padding: '16px 20px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                            <div style={{ color: '#fff', fontSize: 15, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 8 }}>
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" strokeWidth="2"><path d="M12 2c0 6-6 8-6 14a6 6 0 0012 0c0-2-1-3.5-2-5-1 2-2 3-3 3 1-3 1-7-1-12z"/></svg>
                                熱門問題排行
                            </div>
                            <button onClick={() => setHotOpen(false)} style={{ background: 'rgba(255,255,255,0.15)', border: 'none', color: '#fff', width: 28, height: 28, borderRadius: 8, cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>✕</button>
                        </div>
                        <div style={{ flex: 1, overflowY: 'auto', padding: '14px 16px' }}>
                            {hotList.length === 0 ? (
                                <div style={{ textAlign: 'center', padding: '40px 20px', color: '#94a3b8', fontSize: 13 }}>
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5" style={{ margin: '0 auto 10px', display: 'block' }}><path d="M12 2c0 6-6 8-6 14a6 6 0 0012 0c0-2-1-3.5-2-5-1 2-2 3-3 3 1-3 1-7-1-12z"/></svg>
                                    <p>尚無複製紀錄</p>
                                    <p style={{ fontSize: 11, marginTop: 6 }}>每次點擊「複製」後<br/>使用次數會自動累計在這裡</p>
                                </div>
                            ) : (
                                <>
                                    {hotList.map((item, i) => (
                                        <div key={item.id} className="hot-card" onClick={() => scrollToFaq(item.id)}>
                                            <div className={`hot-rank ${i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-n'}`}>
                                                {i < 3 ? medals[i] : i + 1}
                                            </div>
                                            <div style={{ flex: 1, minWidth: 0 }}>
                                                <div className="hot-title" style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.label}</div>
                                                <div style={{ marginTop: 4 }}>
                                                    <span className="hot-count">
                                                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                                                        複製 {item.count} 次
                                                    </span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    <p style={{ fontSize: 11, color: '#cbd5e1', textAlign: 'center', marginTop: 12, paddingBottom: 8 }}>依複製次數自動排列・儲存於本機</p>
                                </>
                            )}
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
