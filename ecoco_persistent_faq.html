<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOCO FAQ 管理系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { ecoco: { orange: '#FF5000', deepBlue: '#060E9F', yellow: '#FFCE00', lightBlue: '#8EB9C9', beige: '#FAE0B8', aqua: '#0076A9' } } } }
        }
    </script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        .card-animate { transition: transform 0.2s, box-shadow 0.2s; }
        .card-animate:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }

        /* Sidebar */
        #faq-sidebar {
            width: 72px; min-width: 72px; background: #060E9F;
            display: flex; flex-direction: column; align-items: center;
            padding: 12px 0 20px; gap: 2px;
            position: sticky; top: 0; height: 100vh; z-index: 40;
        }
        .sb-logo { width: 36px; height: 36px; background: #FF5000; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #fff; font-size: 16px; margin-bottom: 12px; }
        .sb-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; border-radius: 11px; cursor: pointer; width: 62px; transition: background 0.15s; border: none; background: transparent; }
        .sb-btn:hover { background: rgba(255,255,255,0.12); }
        .sb-btn.sb-active { background: rgba(255,255,255,0.2); }
        .sb-btn svg { width: 20px; height: 20px; stroke: rgba(255,255,255,0.5); transition: stroke 0.15s; }
        .sb-btn.sb-active svg, .sb-btn:hover svg { stroke: #fff; }
        .sb-label { font-size: 10px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.3; transition: color 0.15s; }
        .sb-btn.sb-active .sb-label, .sb-btn:hover .sb-label { color: #fff; }
        .sb-btn.sb-hot svg { stroke: #fbbf24; }
        .sb-btn.sb-hot .sb-label { color: #fbbf24; }
        .sb-btn.sb-smart svg { stroke: #34d399; }
        .sb-btn.sb-smart .sb-label { color: #34d399; }
        .sb-btn.sb-smart.sb-active { background: rgba(52,211,153,0.15); }
        .sb-divider { width: 36px; height: 1px; background: rgba(255,255,255,0.15); margin: 6px 0; }
        .sb-badge { background: #f59e0b; color: #fff; font-size: 9px; padding: 1px 5px; border-radius: 999px; font-weight: 700; min-width: 16px; text-align: center; line-height: 1.6; }

        /* Chip filter bar */
        #chip-bar { display: none; flex-wrap: wrap; gap: 8px; padding: 10px 20px 8px; background: #f8faff; border-bottom: 1px solid #e0e7ff; }
        #chip-bar.visible { display: flex; }
        .chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1.5px solid #c7d2fe; background: #fff; color: #3730a3; transition: all 0.15s; white-space: nowrap; }
        .chip:hover { background: #e0e7ff; border-color: #818cf8; }
        .chip.chip-active { background: #060E9F; color: #fff; border-color: #060E9F; }
        .chip-count { background: rgba(255,255,255,0.25); border-radius: 999px; padding: 0px 6px; font-size: 10px; font-weight: 700; }
        .chip.chip-active .chip-count { background: rgba(255,255,255,0.25); }
        .chip:not(.chip-active) .chip-count { background: #e0e7ff; color: #3730a3; }

        /* Hot Panel */
        #hot-panel { position: fixed; top: 0; left: 72px; width: 320px; height: 100vh; background: #fff; border-right: 1px solid #e2e8f0; z-index: 200; display: none; flex-direction: column; box-shadow: 6px 0 24px rgba(0,0,0,0.1); }
        #hot-panel.open { display: flex; }

        /* Smart Panel */
        #smart-panel { position: fixed; top: 0; left: 72px; width: 360px; height: 100vh; background: #fff; border-right: 1px solid #e2e8f0; z-index: 200; display: none; flex-direction: column; box-shadow: 6px 0 24px rgba(0,0,0,0.1); }
        #smart-panel.open { display: flex; }

        #side-overlay { display: none; position: fixed; inset: 0; background: rgba(6,14,159,0.12); z-index: 190; }
        #side-overlay.open { display: block; }

        .hot-card { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 8px; cursor: pointer; background: #fff; transition: border-color 0.15s, background 0.15s; }
        .hot-card:hover { border-color: #060E9F; background: #f0f3ff; }
        .hot-rank { font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; line-height: 1.3; }
        .rank-1 { color: #f59e0b; } .rank-2 { color: #94a3b8; } .rank-3 { color: #b45309; } .rank-n { color: #cbd5e1; font-size: 12px; }
        .hot-title { font-size: 12px; font-weight: 500; color: #1e293b; margin-bottom: 3px; }
        .hot-count { display: inline-flex; align-items: center; gap: 3px; background: #fef3c7; color: #92400e; padding: 1px 7px; border-radius: 999px; font-weight: 600; font-size: 10px; }

        /* Smart match result cards */
        .match-card { border: 1.5px solid #d1fae5; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; background: #fff; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
        .match-card:hover { border-color: #059669; background: #f0fdf4; }
        .match-score { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: #d1fae5; color: #065f46; margin-bottom: 6px; }
        .match-title { font-size: 13px; font-weight: 600; color: #1e293b; margin-bottom: 4px; }
        .match-preview { font-size: 11px; color: #64748b; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .match-copy-btn { margin-top: 8px; font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid #d1fae5; background: #f0fdf4; color: #065f46; cursor: pointer; transition: all 0.15s; }
        .match-copy-btn:hover { background: #059669; color: #fff; border-color: #059669; }

        .panel-header { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
        .panel-close { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 26px; height: 26px; border-radius: 7px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .panel-close:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const API_URL = window.location.origin;

    const COPY_KEY = 'ecoco_copy_counts';
    function getCopyCounts() { try { return JSON.parse(localStorage.getItem(COPY_KEY) || '{}'); } catch { return {}; } }
    function saveCopyCounts(d) { localStorage.setItem(COPY_KEY, JSON.stringify(d)); }

    // Simple keyword match scorer
    function scoreMatch(faq, query) {
        if (!query.trim()) return 0;
        const q = query.toLowerCase();
        const words = q.split(/\s+/).filter(Boolean);
        const fields = [faq.theme||'', faq.main_item||'', faq.sub_item||'', faq.detail||'', faq.content_v1||'', faq.content_v2||''].join(' ').toLowerCase();
        let score = 0;
        words.forEach(w => {
            if (fields.includes(w)) {
                score += (faq.detail||'').toLowerCase().includes(w) ? 3 : 1;
                if ((faq.content_v1||'').toLowerCase().includes(w)) score += 2;
            }
        });
        return score;
    }

    const medals = ['🥇','🥈','🥉'];

    function App() {
        const [faqs, setFaqs] = useState([]);
        const [loading, setLoading] = useState(true);
        const [connected, setConnected] = useState(false);
        const [searchTerm, setSearchTerm] = useState('');
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [editingFaq, setEditingFaq] = useState(null);
        const [formData, setFormData] = useState({ theme:'', main_item:'', sub_item:'', detail:'', content_v1:'', content_v2:'', is_archived: 0 });
        const [guideVisible, setGuideVisible] = useState(true);

        // Sidebar
        const [sidebarMode, setSidebarMode] = useState('all'); // all | theme | item | version
        const [activeChip, setActiveChip] = useState(null);
        const [hotOpen, setHotOpen] = useState(false);
        const [smartOpen, setSmartOpen] = useState(false);
        const [copyCounts, setCopyCounts] = useState(getCopyCounts());
        const [smartQuery, setSmartQuery] = useState('');
        const [smartResults, setSmartResults] = useState([]);
        const smartRef = useRef(null);

        useEffect(() => { checkConnection(); fetchFaqs(); const iv = setInterval(checkConnection, 5000); return () => clearInterval(iv); }, []);

        const checkConnection = async () => { try { const r = await fetch(`${API_URL}/faqs`); setConnected(r.ok); } catch { setConnected(false); } };
        const fetchFaqs = async () => { setLoading(true); try { const r = await fetch(`${API_URL}/faqs`); if (r.ok) { const d = await r.json(); setFaqs(Array.isArray(d)?d:[]); } } catch(e){} finally { setLoading(false); } };

        const handleSubmit = async (e) => {
            e.preventDefault();
            const method = editingFaq ? 'PUT' : 'POST';
            const url = editingFaq ? `${API_URL}/faqs/${editingFaq.id}` : `${API_URL}/faqs`;
            try {
                const r = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(formData) });
                if (r.ok) { fetchFaqs(); closeModal(); } else { const e = await r.json(); alert(`操作失敗: ${e.detail||'未知錯誤'}`); }
            } catch { alert("操作失敗，請檢查後端連線"); }
        };
        const handleDelete = async (id) => {
            if (!confirm('確定要刪除這條常見問題嗎？')) return;
            try { const r = await fetch(`${API_URL}/faqs/${id}`,{method:'DELETE'}); if(r.ok) fetchFaqs(); else alert("刪除失敗"); } catch { alert("連線失敗"); }
        };
        const openModal = (faq=null) => {
            if (faq) { setEditingFaq(faq); setFormData({theme:faq.theme||'',main_item:faq.main_item||'',sub_item:faq.sub_item||'',detail:faq.detail||'',content_v1:faq.content_v1||'',content_v2:faq.content_v2||'',is_archived:faq.is_archived||0}); }
            else { setEditingFaq(null); setFormData({theme:'',main_item:'',sub_item:'',detail:'',content_v1:'',content_v2:'',is_archived:0}); }
            setIsModalOpen(true);
        };
        const closeModal = () => { setIsModalOpen(false); setEditingFaq(null); };

        const handleArchive = async (faq) => {
            const newStatus = faq.is_archived === 1 ? 0 : 1;
            const action = newStatus === 1 ? '封存' : '解除封存';
            if (!confirm(`確定要${action}這條常見問題嗎？`)) return;
            try {
                const r = await fetch(`${API_URL}/faqs/${faq.id}`, {
                    method: 'PUT',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({...faq, is_archived: newStatus})
                });
                if (r.ok) fetchFaqs(); else alert("操作失敗");
            } catch { alert("連線失敗"); }
        };

        const copyToClipboard = (text, faqId, label) => {
            if (!text) return;
            navigator.clipboard.writeText(text);
            alert('已複製到剪貼簿');
            const counts = getCopyCounts();
            if (!counts[faqId]) counts[faqId] = { label, count: 0 };
            counts[faqId].count += 1; counts[faqId].label = label;
            saveCopyCounts(counts); setCopyCounts({...counts});
        };
        const copyRowForSheet = (faq) => {
            const row = [faq.theme||'',faq.main_item||'',faq.sub_item||'',faq.detail||'',faq.content_v1||'',faq.content_v2||'',faq.created_date||''].join('\t');
            navigator.clipboard.writeText(row); alert('已複製整列資料 (適用於 Google Sheet 貼上)');
        };

        const exportCSV = () => {
            if (faqs.length === 0) { alert('目前沒有資料可以匯出'); return; }
            const headers = ['主題','主項目','小項目','細項','標準回覆(V1)','備用英文(V2)','建立日期'];
            const rows = faqs.map(f => [
                f.theme||'', f.main_item||'', f.sub_item||'', f.detail||'',
                (f.content_v1||'').replace(/"/g,'""').replace(/\n/g,' '),
                (f.content_v2||'').replace(/"/g,'""').replace(/\n/g,' '),
                f.created_date||''
            ].map(v => `"${v}"`).join(','));
            const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `ECOCO_FAQ_${new Date().toISOString().slice(0,10)}.csv`;
            a.click(); URL.revokeObjectURL(url);
        };

        const exportExcel = () => {
            if (faqs.length === 0) { alert('目前沒有資料可以匯出'); return; }
            const headers = ['主題','主項目','小項目','細項','標準回覆(V1)','備用英文(V2)','建立日期'];
            const rows = faqs.map(f => [
                f.theme||'', f.main_item||'', f.sub_item||'', f.detail||'',
                f.content_v1||'', f.content_v2||'', f.created_date||''
            ]);
            // Build XML-based Excel (xls)
            let xml = `<?xml version="1.0"?><?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet"
 xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
<Worksheet ss:Name="ECOCO FAQ"><Table>`;
            const toCell = (v) => `<Cell><Data ss:Type="String">${String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</Data></Cell>`;
            xml += '<Row>' + headers.map(toCell).join('') + '</Row>';
            rows.forEach(r => { xml += '<Row>' + r.map(toCell).join('') + '</Row>'; });
            xml += '</Table></Worksheet></Workbook>';
            const blob = new Blob([xml], { type: 'application/vnd.ms-excel;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `ECOCO_FAQ_${new Date().toISOString().slice(0,10)}.xls`;
            a.click(); URL.revokeObjectURL(url);
        };

        const exportPDF = () => {
            if (faqs.length === 0) { alert('目前沒有資料可以匯出'); return; }
            const date = new Date().toLocaleDateString('zh-TW');
            const esc = (s) => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const cards = filteredFaqs.map((f,i) => `
                <div class="card">
                    <div class="card-header">
                        <div class="tags">
                            <span class="tag tag-theme">主題｜${esc(f.theme)}</span>
                            ${f.main_item?`<span class="tag tag-item">項目｜${esc(f.main_item)}</span>`:''}
                            ${f.sub_item?`<span class="tag tag-ver">版本｜${esc(f.sub_item)}</span>`:''}
                        </div>
                        <div class="card-meta">建立日：${esc(f.created_date||'')}　第 ${i+1} 筆</div>
                    </div>
                    <div class="card-title">${esc(f.detail||'')}</div>
                    <div class="content-grid">
                        <div class="content-box">
                            <div class="content-label v1">V1 標準回覆</div>
                            <div class="content-text">${esc(f.content_v1||'（尚未輸入）').replace(/\n/g,'<br>')}</div>
                        </div>
                        ${f.content_v2?`<div class="content-box">
                            <div class="content-label v2">V2 備用／英文</div>
                            <div class="content-text">${esc(f.content_v2).replace(/\n/g,'<br>')}</div>
                        </div>`:''}
                    </div>
                </div>`).join('');
            const html = `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>ECOCO FAQ 知識庫</title>
            <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;background:#f8fafc;color:#1e293b;font-size:12px}
            .page-header{background:#060E9F;color:white;padding:20px 32px;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
            .page-header h1{font-size:20px;font-weight:700;letter-spacing:1px}.page-header .meta{font-size:11px;opacity:.8;text-align:right}
            .summary{margin:0 32px 20px;padding:10px 16px;background:#eff6ff;border-left:4px solid #060E9F;border-radius:0 8px 8px 0;font-size:12px;color:#1e40af}
            .cards{padding:0 32px 32px}.card{background:white;border-radius:12px;border:1px solid #e2e8f0;border-left:4px solid #060E9F;margin-bottom:20px;overflow:hidden;page-break-inside:avoid}
            .card-header{background:#f8fafc;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;gap:8px}
            .tags{display:flex;gap:6px;flex-wrap:wrap}.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px}
            .tag-theme{background:#e0e7ff;color:#3730a3}.tag-item{background:#cffafe;color:#0e7490}.tag-ver{background:#dbeafe;color:#1d4ed8}
            .card-meta{font-size:10px;color:#94a3b8}.card-title{padding:10px 16px 8px;font-size:14px;font-weight:700;color:#060E9F}
            .content-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
            .content-box{padding:10px 16px 14px;border-top:1px solid #f1f5f9}.content-box:nth-child(2){border-left:1px solid #f1f5f9}
            .content-label{font-size:10px;font-weight:800;margin-bottom:6px;padding:2px 8px;border-radius:4px;display:inline-block}
            .v1{background:#FF5000;color:white}.v2{background:#0076A9;color:white}
            .content-text{font-size:11px;color:#475569;line-height:1.7}
            @media print{body{background:white}.page-header,.tag,.content-label{-webkit-print-color-adjust:exact;print-color-adjust:exact}.card{page-break-inside:avoid}}
            </style></head><body>
            <div class="page-header"><div><h1>ECOCO FAQ Assistant</h1><div style="font-size:11px;opacity:.7;margin-top:4px">Knowledge Base Management</div></div>
            <div class="meta">匯出日期：${date}<br>共 ${filteredFaqs.length} 筆問答</div></div>
            <div class="summary">共匯出 <strong>${filteredFaqs.length}</strong> 筆 FAQ 內容${activeChip?`　篩選條件：${activeChip}`:''}</div>
            <div class="cards">${cards}</div></body></html>`;
            const w = window.open('','_blank');
            w.document.write(html); w.document.close();
            setTimeout(()=>{ w.focus(); w.print(); }, 600);
        };

        // Chip options from current faqs
        const chipOptions = useMemo(() => {
            if (sidebarMode === 'all' || sidebarMode === 'hot' || sidebarMode === 'archive') return [];
            const field = sidebarMode === 'theme' ? 'theme' : sidebarMode === 'item' ? 'main_item' : 'sub_item';
            const counts = {};
            faqs.filter(f => f.is_archived !== 1).forEach(f => { const v = f[field]; if (v) counts[v] = (counts[v]||0)+1; });
            return Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([val,cnt])=>({val,cnt}));
        }, [faqs, sidebarMode]);

        // Filtered faqs
        const filteredFaqs = useMemo(() => {
            let result = faqs.filter(faq =>
                [faq.theme,faq.content_v1,faq.content_v2,faq.main_item,faq.detail,faq.sub_item].some(f=>(f||'').toLowerCase().includes(searchTerm.toLowerCase()))
            );
            if (sidebarMode === 'archive') {
                result = result.filter(f => f.is_archived === 1);
            } else {
                result = result.filter(f => f.is_archived !== 1);
                if (activeChip) {
                    const field = sidebarMode === 'theme' ? 'theme' : sidebarMode === 'item' ? 'main_item' : 'sub_item';
                    result = result.filter(f => f[field] === activeChip);
                }
            }
            return result;
        }, [faqs, searchTerm, activeChip, sidebarMode]);

        // Hot list
        const hotList = useMemo(() => Object.entries(copyCounts).map(([id,v])=>({id,label:v.label,count:v.count})).sort((a,b)=>b.count-a.count), [copyCounts]);

        // Smart match
        const runSmartMatch = (q) => {
            setSmartQuery(q);
            if (!q.trim()) { setSmartResults([]); return; }
            const scored = faqs.map(f=>({faq:f, score:scoreMatch(f,q)})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score).slice(0,6);
            setSmartResults(scored);
        };

        const setSidebarNav = (mode) => {
            setSidebarMode(mode); setActiveChip(null);
            setHotOpen(false); setSmartOpen(false);
        };
        const toggleHot = () => { setSmartOpen(false); setHotOpen(v=>!v); };
        const toggleSmart = () => { setHotOpen(false); setSmartOpen(v=>!v); setTimeout(()=>smartRef.current&&smartRef.current.focus(),100); };
        const closePanel = () => { setHotOpen(false); setSmartOpen(false); };

        const scrollToFaq = (faqId) => {
            closePanel();
            setTimeout(()=>{ const el=document.getElementById('faq-'+faqId); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.outline='2px solid #060E9F'; setTimeout(()=>el.style.outline='',2000); } },200);
        };

        const modeLabel = { theme:'主題', item:'項目', version:'版本', archive:'封存' };

        return (
            <div style={{display:'flex', minHeight:'100vh'}}>

                {/* ── Sidebar ── */}
                <nav id="faq-sidebar">
                    <div className="sb-logo">E</div>

                    <button className={`sb-btn ${sidebarMode==='all'&&!hotOpen&&!smartOpen?'sb-active':''}`} onClick={()=>setSidebarNav('all')}>

                                </div>

                                    <h1 className="text-xl font-bold tracking-wider">ECOCO FAQ Assistant</h1>
                                    <p className="text-[10px] text-ecoco-lightBlue uppercase tracking-[0.2em]">Knowledge Base Management</p>
                                </div>
                            </div>
                            <div className="flex items-center space-x-4">
                                <button onClick={()=>setGuideVisible(!guideVisible)} className="text-ecoco-yellow hover:text-white transition-colors flex items-center space-x-1 text-sm font-medium">

                                </div>
                            </div>

                                        <li className="flex items-center space-x-2"><i className="fas fa-check-circle text-ecoco-aqua text-xs"></i><span>當右上方狀態為 <span className="text-green-600 font-bold">Online</span> 時，所有新增/修改都會永久儲存在 SQLite 資料庫中。</span></li>
                                    </ul>
                                </div>
                            </div>

                                </button>

                                </button>

                                <span>共 {filteredFaqs.length} 筆</span>
                                {activeChip && <button onClick={()=>setActiveChip(null)} className="text-xs text-ecoco-orange hover:underline ml-1">✕ 清除</button>}
                            </div>
                        )}

                                <h3 className="text-lg font-bold text-red-700">無法連線至後端伺服器 (Offline)</h3>

                            </div>
                        ) : filteredFaqs.length > 0 ? (
                            <div className="space-y-8">
                                {filteredFaqs.map(faq => {
                                    const isArchived = faq.is_archived === 1;
                                    return (
                                    <div key={faq.id} id={`faq-${faq.id}`} className={`bg-white rounded-2xl shadow-sm border-l-4 overflow-hidden flex flex-col animate-fade-in group ${isArchived ? 'border-l-[#999EA2] bg-[#f8f9fa] border border-gray-200' : 'border-l-ecoco-deepBlue border border-gray-100'}`}>
                                        <div className="p-4 md:p-6 border-b border-gray-50 flex flex-col md:flex-row items-start md:items-center space-y-4 md:space-y-0">
                                            <div className="flex flex-wrap gap-2 md:mr-4 text-base">
                                                <div className={`flex items-center font-bold rounded overflow-hidden border ${isArchived ? 'bg-gray-100 text-[#999EA2] border-gray-200' : 'bg-indigo-50 text-ecoco-deepBlue border-indigo-100'}`}>
                                                    <span className={`px-3 py-1.5 ${isArchived ? 'bg-gray-200 text-[#7a7f85]' : 'bg-indigo-100'}`}>主題</span>
                                                    <span className={`px-3 py-1.5 cursor-pointer transition-colors ${isArchived ? 'hover:bg-gray-200' : 'hover:bg-indigo-100'}`} onClick={()=>{setSidebarMode('theme');setActiveChip(faq.theme);}}>{faq.theme}</span>
                                                </div>
                                                <div className={`flex items-center font-bold rounded overflow-hidden border ${isArchived ? 'bg-gray-100 text-[#999EA2] border-gray-200' : 'bg-cyan-50 text-ecoco-aqua border-cyan-100'}`}>
                                                    <span className={`px-3 py-1.5 ${isArchived ? 'bg-gray-200 text-[#7a7f85]' : 'bg-cyan-100'}`}>項目</span>
                                                    <span className={`px-3 py-1.5 cursor-pointer transition-colors ${isArchived ? 'hover:bg-gray-200' : 'hover:bg-cyan-100'}`} onClick={()=>{setSidebarMode('item');setActiveChip(faq.main_item);}}>{faq.main_item||'-'}</span>
                                                </div>
                                                <div className={`flex items-center font-bold rounded overflow-hidden border ${isArchived ? 'bg-gray-100 text-[#999EA2] border-gray-200' : 'bg-blue-50 text-ecoco-lightBlue border-blue-100'}`}>
                                                    <span className={`px-3 py-1.5 ${isArchived ? 'bg-gray-200 text-[#7a7f85]' : 'bg-blue-100'}`}>版本</span>
                                                    <span className={`px-3 py-1.5 cursor-pointer transition-colors ${isArchived ? 'hover:bg-gray-200' : 'hover:bg-blue-100'}`} onClick={()=>{setSidebarMode('version');setActiveChip(faq.sub_item);}}>{faq.sub_item||'-'}</span>
                                                </div>
                                            </div>
                                            <h3 className={`font-bold text-lg flex-grow ${isArchived ? 'text-[#999EA2]' : 'text-ecoco-deepBlue'}`}>{faq.detail} {isArchived && <span className="text-sm font-normal text-[#999EA2] bg-gray-200 px-2 py-0.5 rounded ml-2">[已封存]</span>}</h3>
                                            <div className="flex items-center space-x-4 w-full md:w-auto justify-between md:justify-end">

                                                <div className="flex space-x-1">
                                                    <button onClick={()=>openModal(faq)} className={`p-2 transition-colors ${isArchived ? 'text-[#999EA2] hover:text-gray-600' : 'text-gray-400 hover:text-ecoco-deepBlue'}`}><i className="fas fa-pen"></i></button>
                                                    <button onClick={()=>handleArchive(faq)} className={`p-2 transition-colors ${isArchived ? 'text-[#999EA2] hover:text-gray-600' : 'text-gray-400 hover:text-ecoco-deepBlue'}`} title={isArchived ? '解除封存' : '封存'}><i className={`fas ${isArchived ? 'fa-box-open' : 'fa-box'}`}></i></button>
                                                    <button onClick={()=>handleDelete(faq.id)} className={`p-2 transition-colors ${isArchived ? 'text-[#999EA2] hover:text-red-500' : 'text-gray-400 hover:text-red-500'}`}><i className="fas fa-trash-alt"></i></button>
                                                </div>
                                            </div>
                                        </div>
                                        <div className={`p-4 md:p-6 grid grid-cols-1 lg:grid-cols-2 gap-4 ${isArchived ? 'bg-gray-100/50' : 'bg-gray-50/30'}`}>

                                                    <div className="flex items-center space-x-2">
                                                        <span className={`text-white text-[10px] font-black px-1.5 py-0.5 rounded ${isArchived ? 'bg-[#999EA2]' : 'bg-ecoco-orange'}`}>V1</span>
                                                        <span className={`text-sm font-bold ${isArchived ? 'text-[#999EA2]' : 'text-ecoco-orange'}`}>標準回覆</span>
                                                    </div>

                                                        <i className="fas fa-copy"></i><span>複製</span>
                                                    </button>
                                                </div>
                                                <div className={`text-sm leading-relaxed min-h-[5rem] whitespace-pre-wrap ${isArchived ? 'text-[#999EA2]' : 'text-gray-600'}`}>{faq.content_v1||<span className="italic text-gray-300">尚未輸入內容...</span>}</div>
                                            </div>
                                            <div className={`rounded-xl border p-4 shadow-sm ${isArchived ? 'bg-gray-50 border-gray-200' : 'bg-white border-gray-100'}`}>

                                                        <span className={`text-white text-[10px] font-black px-1.5 py-0.5 rounded ${isArchived ? 'bg-[#999EA2]' : 'bg-ecoco-aqua'}`}>V2</span>
                                                        <span className={`text-sm font-bold ${isArchived ? 'text-[#999EA2]' : 'text-ecoco-aqua'}`}>備用/英文</span>
                                                    </div>
                                                    <button onClick={()=>copyToClipboard(faq.content_v2,faq.id,faq.detail||faq.theme)} className={`text-sm bg-gray-50 px-3 py-1.5 rounded border border-gray-100 transition-all flex items-center space-x-1 ${isArchived ? 'text-[#999EA2] hover:bg-[#999EA2] hover:text-white' : 'text-ecoco-deepBlue hover:bg-ecoco-deepBlue hover:text-white'}`}>
                                                        <i className="fas fa-copy"></i><span>複製</span>
                                                    </button>
                                                </div>
                                                <div className={`text-sm leading-relaxed min-h-[5rem] whitespace-pre-wrap ${isArchived ? 'text-[#999EA2]' : 'text-gray-600'}`}>{faq.content_v2||<span className="italic text-gray-300">尚未輸入內容...</span>}</div>
                                            </div>
                                        </div>
                                        <div className={`px-4 py-3 md:px-6 border-t flex flex-col md:flex-row justify-between items-center space-y-3 md:space-y-0 ${isArchived ? 'bg-gray-100/80 border-gray-200' : 'bg-ecoco-beige/20 border-gray-50'}`}>
                                            <div className={`flex items-center space-x-2 ${isArchived ? 'text-[#999EA2]' : 'text-ecoco-orange'}`}>
                                                <i className={`far fa-lightbulb text-sm ${isArchived ? '' : 'animate-pulse'}`}></i>
                                                <span className="text-[11px] font-bold">這筆問答還沒匯入總表嗎?</span>

                                                <i className="fas fa-file-export"></i><span>複製整列 (Google Sheet 格式)</span>
                                            </button>
                                        </div>
                                    </div>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="text-center py-20 bg-white/50 rounded-[3rem] border-4 border-dashed border-ecoco-beige flex flex-col items-center">
                                <div className="w-24 h-24 bg-ecoco-beige/30 rounded-full flex items-center justify-center text-ecoco-beige text-5xl mb-6"><i className="fas fa-cloud-sun"></i></div>
                                <h3 className="text-2xl font-bold text-ecoco-deepBlue/40">{searchTerm||activeChip?'無相符結果':'探索新的問題'}</h3>
                            </div>
                        )}
                    </main>

                    {/* Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-ecoco-deepBlue/20 backdrop-blur-md">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-6xl shadow-2xl overflow-hidden animate-modal-up border border-white max-h-[90vh] overflow-y-auto">
                                <div className="bg-white p-8 pb-4 text-ecoco-deepBlue flex justify-between items-center sticky top-0 z-10">
                                    <div className="flex items-center space-x-3">
                                        <div className="bg-ecoco-orange/10 text-ecoco-orange p-2 rounded-lg"><i className="far fa-file-alt text-xl"></i></div>
                                        <h2 className="text-2xl font-bold">記錄新的用戶問題至知識庫</h2>
                                    </div>
                                    <button onClick={closeModal} className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors text-2xl text-gray-400">&times;</button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-8 space-y-8">
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                                        {[['theme','主題 (Theme)','例: APP2.0'],['main_item','主項目 (Main Item)','例: 站點'],['sub_item','小項目 (Sub Item)','例: 繁體版'],['detail','細項 (Detail/User Question)','例: 地圖看不到綠色站點']].map(([key,label,ph])=>(
                                            <div key={key} className="space-y-2">
                                                <label className="text-sm font-bold text-ecoco-deepBlue flex items-center mb-1">{label}</label>
                                                <input type="text" required={key==='theme'} placeholder={ph} className="w-full px-4 py-3 rounded-xl bg-gray-50 border-2 border-transparent focus:border-ecoco-deepBlue focus:bg-white outline-none transition-all" value={formData[key]} onChange={(e)=>setFormData({...formData,[key]:e.target.value})} />
                                            </div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        <div className="space-y-3">
                                            <label className="text-sm font-bold text-ecoco-orange flex items-center">內容版本1 (標準官方回覆)</label>
                                            <textarea rows="6" placeholder="請輸入適合直接貼給用戶的標準回覆..." className="w-full px-5 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:border-ecoco-orange focus:bg-white outline-none transition-all resize-none shadow-inner" value={formData.content_v1} onChange={(e)=>setFormData({...formData,content_v1:e.target.value})}></textarea>
                                        </div>
                                        <div className="space-y-3">
                                            <label className="text-sm font-bold text-ecoco-aqua flex items-center">內容版本2 (英文版 / 備註補充)</label>

                                        </div>
                                    </div>
                                    <div className="flex justify-end space-x-6 pt-4">
                                        <button type="button" onClick={closeModal} className="px-10 py-4 border-2 border-gray-100 rounded-2xl font-bold text-gray-400 hover:bg-gray-50 transition-colors">取消</button>
                                        <button type="submit" className="px-12 py-4 bg-ecoco-orange text-white rounded-2xl font-bold shadow-xl shadow-ecoco-orange/30 hover:scale-[1.02] active:scale-95 transition-all">確認儲存</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <style>{`
                        @keyframes modal-up { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                        .animate-modal-up { animation: modal-up 0.4s cubic-bezier(0.16,1,0.3,1); }
                        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
                        .animate-fade-in { animation: fade-in 0.6s ease-out; }
                    `}</style>
                </div>

                {/* ── Overlay ── */}
                {(hotOpen||smartOpen) && <div id="side-overlay" className="open" onClick={closePanel}></div>}

                {/* ── Hot Panel ── */}
                <div id="hot-panel" className={hotOpen?'open':''}>
                    <div className="panel-header" style={{background:'#060E9F'}}>
                        <span style={{color:'#fff',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:8}}>
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" strokeWidth="2"><path d="M12 2c0 6-6 8-6 14a6 6 0 0012 0c0-2-1-3.5-2-5-1 2-2 3-3 3 1-3 1-7-1-12z"/></svg>
                            熱門問題排行
                        </span>
                        <button className="panel-close" onClick={closePanel}>✕</button>
                    </div>
                    <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>
                        {hotList.length===0 ? (
                            <div style={{textAlign:'center',padding:'36px 16px',color:'#94a3b8',fontSize:13}}>
                                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5" style={{margin:'0 auto 10px',display:'block'}}><path d="M12 2c0 6-6 8-6 14a6 6 0 0012 0c0-2-1-3.5-2-5-1 2-2 3-3 3 1-3 1-7-1-12z"/></svg>
                                <p>尚無複製紀錄</p>
                                <p style={{fontSize:11,marginTop:5}}>點擊「複製」後會自動累計在這裡</p>
                            </div>
                        ) : hotList.map((item,i)=>(
                            <div key={item.id} className="hot-card" onClick={()=>scrollToFaq(item.id)}>
                                <div className={`hot-rank ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n'}`}>{i<3?medals[i]:i+1}</div>
                                <div style={{flex:1,minWidth:0}}>
                                    <div className="hot-title" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.label}</div>
                                    <span className="hot-count">複製 {item.count} 次</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>

                {/* ── Smart Match Panel ── */}
                <div id="smart-panel" className={smartOpen?'open':''}>
                    <div className="panel-header" style={{background:'#064e3b'}}>
                        <span style={{color:'#fff',fontSize:14,fontWeight:600,display:'flex',alignItems:'center',gap:8}}>
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#34d399" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M8 11h6M11 8v6"/></svg>
                            智能比對
                        </span>
                        <button className="panel-close" onClick={closePanel}>✕</button>
                    </div>
                    <div style={{padding:'12px 14px',borderBottom:'1px solid #e2e8f0'}}>
                        <p style={{fontSize:12,color:'#64748b',marginBottom:8}}>貼上用戶訊息，自動找出最相關的問答：</p>
                        <textarea
                            ref={smartRef}
                            rows={4}
                            placeholder="例：我的點數怎麼沒有入帳？我已經回收了很多次了..."
                            style={{width:'100%',padding:'10px 12px',borderRadius:10,border:'1.5px solid #d1fae5',fontSize:13,resize:'vertical',outline:'none',fontFamily:'inherit',background:'#f0fdf4',boxSizing:'border-box'}}
                            value={smartQuery}
                            onChange={(e)=>runSmartMatch(e.target.value)}
                            onFocus={(e)=>e.target.style.borderColor='#059669'}
                            onBlur={(e)=>e.target.style.borderColor='#d1fae5'}
                        />
                        {smartQuery && (
                            <button onClick={()=>{setSmartQuery('');setSmartResults([]);}} style={{marginTop:6,fontSize:11,color:'#94a3b8',background:'none',border:'none',cursor:'pointer',padding:0}}>✕ 清除</button>
                        )}
                    </div>
                    <div style={{flex:1,overflowY:'auto',padding:'12px 14px'}}>
                        {!smartQuery.trim() ? (
                            <div style={{textAlign:'center',padding:'30px 16px',color:'#94a3b8',fontSize:12}}>
                                <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5" style={{margin:'0 auto 10px',display:'block'}}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
                                輸入用戶說的話，<br/>系統自動找最相關問答
                            </div>
                        ) : smartResults.length === 0 ? (
                            <div style={{textAlign:'center',padding:'30px 16px',color:'#94a3b8',fontSize:12}}>
                                <p>找不到相符的問答</p>
                                <p style={{fontSize:11,marginTop:4}}>試試不同的關鍵字</p>
                            </div>
                        ) : (
                            <>
                                <p style={{fontSize:11,color:'#94a3b8',marginBottom:10}}>找到 {smartResults.length} 筆相關結果</p>
                                {smartResults.map(({faq,score})=>(
                                    <div key={faq.id} className="match-card">
                                        <span className="match-score">相關度 {Math.min(100,score*10)}%</span>
                                        <div className="match-title">{faq.detail || faq.theme}</div>
                                        <div style={{fontSize:11,color:'#94a3b8',marginBottom:4}}>
                                            {[faq.theme,faq.main_item,faq.sub_item].filter(Boolean).join(' › ')}
                                        </div>
                                        <div className="match-preview">{faq.content_v1||'（尚無內容）'}</div>
                                        <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                                            <button className="match-copy-btn" onClick={()=>copyToClipboard(faq.content_v1,faq.id,faq.detail||faq.theme)}>
                                                複製 V1 標準回覆
                                            </button>
                                            {faq.content_v2 && (
                                                <button className="match-copy-btn" onClick={()=>copyToClipboard(faq.content_v2,faq.id,faq.detail||faq.theme)}>
                                                    複製 V2
                                                </button>
                                            )}
                                            <button className="match-copy-btn" style={{borderColor:'#c7d2fe',background:'#f5f3ff',color:'#3730a3'}} onClick={()=>scrollToFaq(faq.id)}>
                                                跳至卡片
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </>
                        )}
                    </div>
                </div>

            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
